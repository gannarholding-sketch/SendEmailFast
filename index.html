<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pacific HR – Email Sender</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #002855;
      --gold:   #C8972B;
      --gold-l: #f0c96a;
      --white:  #ffffff;
      --bg:     #f4f6f9;
      --card:   #ffffff;
      --border: #dde3ed;
      --text:   #1a2640;
      --muted:  #6b7a99;
      --green:  #1a7a4a;
      --red:    #b82c2c;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 680px;
      background: var(--navy);
      border-radius: 14px 14px 0 0;
      padding: 28px 36px;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .logo-badge {
      width: 52px;
      height: 52px;
      background: var(--gold);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: var(--navy);
      flex-shrink: 0;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      color: var(--white);
      font-size: 20px;
      line-height: 1.2;
    }

    header p {
      color: #a0b4cc;
      font-size: 12px;
      margin-top: 3px;
      font-weight: 300;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 680px;
      background: var(--card);
      border: 1px solid var(--border);
      border-top: none;
      padding: 36px;
    }

    .card-footer {
      width: 100%;
      max-width: 680px;
      background: #f9fafb;
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 14px 14px;
      padding: 14px 36px;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
    }

    /* ── Subject preview ── */
    .subject-bar {
      background: #f0f4fa;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .subject-bar span.label {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .6px;
      white-space: nowrap;
    }

    .subject-bar span.value {
      font-size: 13px;
      color: var(--text);
      font-weight: 500;
    }

    /* ── Form ── */
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 8px;
    }

    label span {
      color: var(--gold);
    }

    textarea {
      width: 100%;
      min-height: 140px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      resize: vertical;
      outline: none;
      transition: border-color .2s;
      background: #fafbfd;
    }

    textarea:focus {
      border-color: var(--navy);
      background: #fff;
    }

    textarea::placeholder { color: #aab2c6; }

    .hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ── Counter ── */
    .counter {
      display: inline-block;
      background: var(--navy);
      color: #fff;
      font-size: 11px;
      font-weight: 500;
      padding: 2px 9px;
      border-radius: 20px;
      margin-left: 8px;
      transition: background .2s;
    }

    /* ── Button ── */
    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      align-items: center;
    }

    button#sendBtn {
      flex: 1;
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 15px 28px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background .2s, transform .1s;
      position: relative;
      overflow: hidden;
    }

    button#sendBtn:hover { background: #003f7a; }
    button#sendBtn:active { transform: scale(.98); }
    button#sendBtn:disabled { background: #8a99b0; cursor: not-allowed; }

    button#clearBtn {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--muted);
      border-radius: 10px;
      padding: 15px 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }

    button#clearBtn:hover { border-color: var(--navy); color: var(--navy); }

    /* spinner */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Result panel ── */
    #result {
      margin-top: 24px;
      border-radius: 10px;
      overflow: hidden;
      display: none;
    }

    .result-header {
      padding: 14px 18px;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .result-header.success { background: #e8f7ef; color: var(--green); }
    .result-header.error   { background: #fdeaea; color: var(--red); }

    .result-body {
      padding: 14px 18px;
      background: #f9fafb;
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 10px 10px;
    }

    .email-tag {
      display: inline-block;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 20px;
      margin: 3px;
    }

    .email-tag.ok  { background: #d4f2e2; color: #1a5c38; }
    .email-tag.err { background: #fde8e8; color: #8b1c1c; }

    .result-stats {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-badge">P</div>
    <div>
      <h1>Pacific Human Resources</h1>
      <p>Bulk Email Sender &nbsp;·&nbsp; Manpower Outreach Tool</p>
    </div>
  </header>

  <div class="card">

    <!-- Subject preview -->
    <div class="subject-bar">
      <span class="label">Subject</span>
      <span class="value">Regarding Hiring Manpower from Nepal</span>
    </div>

    <!-- Email input -->
    <label>
      Recipient Email Addresses
      <span id="counter" class="counter">0</span>
    </label>
    <textarea id="emailInput"
      placeholder="Enter email addresses, one per line or comma-separated:&#10;&#10;hr@company.com&#10;info@business.ae&#10;ceo@firm.com"></textarea>
    <p class="hint">You can paste a list — one email per line, or separated by commas.</p>

    <div class="btn-row">
      <button id="sendBtn" onclick="sendEmails()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span id="btnText">Send Emails</span>
        <div class="spinner" id="spinner"></div>
      </button>
      <button id="clearBtn" onclick="clearAll()">Clear</button>
    </div>

    <!-- Result -->
    <div id="result"></div>

  </div>

  <div class="card-footer">
    PACIFIC HUMAN RESOURCES PVT. LTD. &nbsp;·&nbsp; ISO 9001:2008 Certified &nbsp;·&nbsp; Kathmandu, Nepal
  </div>

  <script>
    const input = document.getElementById("emailInput");
    const counter = document.getElementById("counter");

    // Live email counter
    input.addEventListener("input", () => {
      const emails = parseEmails(input.value);
      counter.textContent = emails.length;
      counter.style.background = emails.length > 0 ? "#C8972B" : "#002855";
    });

    function parseEmails(raw) {
      return raw.replace(/\n/g, ",").split(",")
        .map(e => e.trim()).filter(e => e.length > 0);
    }

    function clearAll() {
      input.value = "";
      counter.textContent = "0";
      counter.style.background = "#002855";
      document.getElementById("result").style.display = "none";
    }

    async function sendEmails() {
      const emails = parseEmails(input.value);
      if (emails.length === 0) {
        showResult("error", "⚠️ Please enter at least one email address.", [], []);
        return;
      }

      // Loading state
      const btn = document.getElementById("sendBtn");
      const btnText = document.getElementById("btnText");
      const spinner = document.getElementById("spinner");
      btn.disabled = true;
      btnText.textContent = "Sending...";
      spinner.style.display = "block";
      document.getElementById("result").style.display = "none";

      try {
        const res = await fetch("/send", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ emails: input.value })
        });

        const data = await res.json();

        if (!data.success) {
          showResult("error", "❌ " + data.message, [], []);
        } else {
          const headerMsg = `✅ ${data.sent} email${data.sent !== 1 ? "s" : ""} sent successfully` +
            (data.failed > 0 ? ` · ❌ ${data.failed} failed` : "");
          showResult(data.failed > 0 ? "error" : "success", headerMsg, data.successList, data.failedList);
        }

      } catch (err) {
        showResult("error", "❌ Could not connect to server. Make sure app.py is running.", [], []);
      } finally {
        btn.disabled = false;
        btnText.textContent = "Send Emails";
        spinner.style.display = "none";
      }
    }

    function showResult(type, headerMsg, successList, failedList) {
      const el = document.getElementById("result");

      let tagsHtml = "";
      if (successList.length) {
        tagsHtml += successList.map(e => `<span class="email-tag ok">✓ ${e}</span>`).join("");
      }
      if (failedList.length) {
        tagsHtml += failedList.map(f => `<span class="email-tag err">✗ ${f.email}</span>`).join("");
      }

      el.innerHTML = `
        <div class="result-header ${type}">${headerMsg}</div>
        ${tagsHtml ? `<div class="result-body"><div class="result-stats">Delivery summary:</div>${tagsHtml}</div>` : ""}
      `;
      el.style.display = "block";
    }
  </script>

</body>
</html>
